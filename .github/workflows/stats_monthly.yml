name: Stats mensuelles ECV

on:
  schedule:
    - cron: "0 7 1 * *"   # 1er de chaque mois a 7h UTC
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install \
            google-api-python-client==2.131.0 \
            google-auth==2.29.0 \
            google-auth-oauthlib==1.2.0 \
            requests \
            PyNaCl

      - name: Fetch stats + refresh IG token + update Sheet
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
          WINDSOR_TIKTOK_ACCOUNT_ID: ${{ secrets.WINDSOR_TIKTOK_ACCOUNT_ID }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKENS_JSON: ${{ secrets.GOOGLE_TOKENS_JSON }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
        run: python scripts/monthly_social_stats.py